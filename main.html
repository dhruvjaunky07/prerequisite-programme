<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prerequisite Programme Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 20px; }
    .grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .card { background: white; border-radius: 8px; padding: 20px; width: 250px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .card h2 { font-size: 18px; margin-bottom: 10px; }
    .card ul { padding-left: 20px; }
  </style>
</head>
<body>
  <h1>Prerequisite Programme</h1>
  <div class="grid">
    <div class="card">
      <h2>🧼 Personal Hygiene</h2>
      <ul>
        <li>Wash hands regularly</li>
        <li>Wear protective clothing</li>
        <li>No jewelry in work areas</li>
      </ul>
    </div>
    <div class="card">
      <h2>🧹 Cleaning & Sanitation</h2>
      <ul>
        <li>Scheduled cleaning routines</li>
        <li>Use approved chemicals</li>
        <li>Maintain cleaning records</li>
      </ul>
    </div>
    <!-- Repeat for other topics -->
  </div>
</body>
</html>
